<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Redirect</title>
</head>

<body>

Loading...

<script>

const qrId =
decodeURIComponent(
  window.location.search.substring(1)
);

fetch('/mappings.json')
.then(r => r.json())
.then(data => {

  if(data[qrId]){

    window.location.replace(
      data[qrId]
    );

  }else{

    document.body.innerHTML =
      '<h2>QR Not Activated Yet</h2>';

  }

})
.catch(() => {

  document.body.innerHTML =
    '<h2>System Error</h2>';

});

</script>

</body>
</html>
