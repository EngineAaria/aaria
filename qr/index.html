<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QR Redirect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}
</style>

</head>
<body>

<div id="status">
Loading...
</div>

<script>

async function redirect() {

    const path =
    window.location.pathname;

    const qrId =
    path.split('/').pop();

    try {

        const response =
        await fetch('/mappings.json');

        const mappings =
        await response.json();

        if(mappings[qrId]) {

            window.location.replace(
                mappings[qrId]
            );

            return;
        }

        document.getElementById(
          'status'
        ).innerHTML =
        'QR Not Activated Yet';

    } catch(error){

        document.getElementById(
          'status'
        ).innerHTML =
        'System Error';

    }

}

redirect();

</script>

</body>
</html>
